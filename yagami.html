<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yagami — Iphile's AI Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#050508;
  --surface:#0d0d14;
  --surface2:#13131e;
  --border:rgba(120,100,255,0.12);
  --border2:rgba(120,100,255,0.25);
  --accent:#7c5cfc;
  --accent2:#a78bfa;
  --lime:#a3e635;
  --pink:#f472b6;
  --white:#f0eeff;
  --grey:rgba(240,238,255,0.45);
  --grey2:rgba(240,238,255,0.2);
  --mono:'Space Mono',monospace;
  --sans:'Syne',sans-serif;
}

html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--white);font-family:var(--sans)}

/* BG EFFECTS */
.bg-mesh{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.mesh-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.4}
.m1{width:600px;height:600px;background:radial-gradient(circle,rgba(124,92,252,0.3),transparent);top:-200px;left:-150px;animation:driftA 14s ease-in-out infinite}
.m2{width:400px;height:400px;background:radial-gradient(circle,rgba(244,114,182,0.2),transparent);bottom:-100px;right:-100px;animation:driftB 18s ease-in-out infinite}
.m3{width:300px;height:300px;background:radial-gradient(circle,rgba(163,230,53,0.15),transparent);top:40%;left:60%;animation:driftA 22s ease-in-out infinite reverse}
@keyframes driftA{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,-30px)}}
@keyframes driftB{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,40px)}}

/* SCANLINES */
.scanlines{position:fixed;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px)}

/* LAYOUT */
.shell{position:relative;z-index:10;width:100%;height:100vh;display:flex;flex-direction:column;max-width:680px;margin:0 auto}

/* HEADER */
.header{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;flex-shrink:0;background:rgba(5,5,8,0.8);backdrop-filter:blur(20px)}
.agent-avatar{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--pink));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;position:relative;box-shadow:0 0 20px rgba(124,92,252,0.4)}
.agent-avatar::after{content:'';position:absolute;inset:-2px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--pink));z-index:-1;opacity:0.3;animation:avatarGlow 2s ease-in-out infinite}
@keyframes avatarGlow{0%,100%{opacity:0.3}50%{opacity:0.6}}
.agent-info{flex:1}
.agent-name{font-size:17px;font-weight:800;letter-spacing:-0.3px;color:var(--white)}
.agent-name span{color:var(--accent2)}
.agent-status{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--grey);font-family:var(--mono);margin-top:2px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--lime);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.portfolio-link{font-family:var(--mono);font-size:11px;color:var(--accent2);background:rgba(124,92,252,0.1);border:1px solid var(--border2);padding:6px 12px;border-radius:8px;text-decoration:none;flex-shrink:0}

/* MESSAGES */
.messages{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px 16px;display:flex;flex-direction:column;gap:16px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* MESSAGE BUBBLES */
.msg{display:flex;gap:10px;animation:msgIn 0.35s cubic-bezier(0.34,1.3,0.64,1) both}
@keyframes msgIn{from{opacity:0;transform:translateY(16px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px}
.msg-avatar.agent-av{background:linear-gradient(135deg,var(--accent),var(--pink));box-shadow:0 0 12px rgba(124,92,252,0.3)}
.msg-avatar.user-av{background:linear-gradient(135deg,#1e1e2e,#2a2a3e);border:1px solid var(--border2)}
.bubble{max-width:78%;padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.65;font-family:var(--sans);font-weight:400}
.bubble.agent{background:var(--surface2);border:1px solid var(--border);color:var(--white);border-radius:4px 18px 18px 18px}
.bubble.user{background:linear-gradient(135deg,var(--accent),#6344e0);color:white;border-radius:18px 4px 18px 18px;font-weight:500}
.bubble strong{color:var(--accent2);font-weight:700}
.bubble .tag{display:inline-block;background:rgba(124,92,252,0.15);border:1px solid var(--border2);color:var(--accent2);font-size:11px;font-family:var(--mono);padding:2px 8px;border-radius:6px;margin:2px 2px 0 0}
.bubble .highlight{color:var(--lime);font-weight:700}
.bubble .pink{color:var(--pink);font-weight:600}
.msg-time{font-size:10px;color:var(--grey2);font-family:var(--mono);margin-top:4px;padding:0 4px}
.msg.user .msg-time{text-align:right}

/* TYPING INDICATOR */
.typing-indicator{display:none;align-items:center;gap:10px;padding:4px 0}
.typing-indicator.show{display:flex;animation:msgIn 0.3s both}
.typing-bubble{background:var(--surface2);border:1px solid var(--border);border-radius:4px 18px 18px 18px;padding:12px 16px;display:flex;gap:5px;align-items:center}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:typeDot 1.2s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:0.2s}
.typing-dot:nth-child(3){animation-delay:0.4s}
@keyframes typeDot{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-6px);opacity:1}}

/* QUICK REPLIES */
.quick-replies{padding:10px 16px 6px;display:flex;gap:8px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.quick-replies::-webkit-scrollbar{display:none}
.qr-btn{background:rgba(124,92,252,0.08);border:1px solid var(--border2);color:var(--accent2);font-family:var(--mono);font-size:11px;padding:8px 14px;border-radius:100px;cursor:pointer;white-space:nowrap;transition:all 0.2s;flex-shrink:0}
.qr-btn:hover,.qr-btn:active{background:rgba(124,92,252,0.2);border-color:var(--accent)}

/* INPUT */
.input-area{padding:12px 16px 24px;border-top:1px solid var(--border);background:rgba(5,5,8,0.9);backdrop-filter:blur(20px);flex-shrink:0}
.input-row{display:flex;gap:10px;align-items:flex-end}
.input-box{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--white);font-family:var(--sans);font-size:15px;padding:12px 16px;border-radius:16px;outline:none;resize:none;max-height:120px;min-height:48px;transition:border-color 0.2s;line-height:1.5}
.input-box:focus{border-color:var(--accent)}
.input-box::placeholder{color:var(--grey2)}
.send-btn{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--accent),#6344e0);border:none;color:white;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;box-shadow:0 4px 16px rgba(124,92,252,0.3)}
.send-btn:active{transform:scale(0.92)}
.send-btn:disabled{opacity:0.4;cursor:not-allowed}
.input-hint{font-size:11px;color:var(--grey2);font-family:var(--mono);margin-top:8px;text-align:center}
</style>
</head>
<body>

<div class="bg-mesh">
  <div class="mesh-orb m1"></div>
  <div class="mesh-orb m2"></div>
  <div class="mesh-orb m3"></div>
</div>
<div class="scanlines"></div>

<div class="shell">
  <!-- HEADER -->
  <div class="header">
    <div class="agent-avatar">🤖</div>
    <div class="agent-info">
      <div class="agent-name"><span>Yagami</span> — AI Agent</div>
      <div class="agent-status"><span class="status-dot"></span>Online · Mr Selana's Portfolio</div>
    </div>
    <a href="https://www.iphileakhoselana.co.za" target="_blank" class="portfolio-link">View Portfolio ↗</a>
  </div>

  <!-- MESSAGES -->
  <div class="messages" id="messages">
    <!-- Intro message injected by JS -->
  </div>

  <!-- TYPING -->
  <div class="typing-indicator" id="typingIndicator" style="padding:0 26px 8px">
    <div style="width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--pink));display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0">🤖</div>
    <div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
  </div>

  <!-- QUICK REPLIES -->
  <div class="quick-replies" id="quickReplies">
    <button class="qr-btn" onclick="sendQuick('What can Iphile build?')">What can he build?</button>
    <button class="qr-btn" onclick="sendQuick('Tell me about his projects')">His projects</button>
    <button class="qr-btn" onclick="sendQuick('What are his skills?')">His skills</button>
    <button class="qr-btn" onclick="sendQuick('How can I hire Iphile?')">Hire him</button>
    <button class="qr-btn" onclick="sendQuick('What certifications does he have?')">Certifications</button>
    <button class="qr-btn" onclick="sendQuick('What is his tech stack?')">Tech stack</button>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <div class="input-row">
      <textarea class="input-box" id="inputBox" placeholder="Ask Yagami anything about Iphile..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
    <div class="input-hint">Powered by Claude AI · Iphile Akho Selana © 2025</div>
  </div>
</div>

<script>
var history = [];
var isThinking = false;

function getTime(){
  var n = new Date();
  return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}

function addMessage(role, text, animate){
  var msgs = document.getElementById('messages');
  var isAgent = role === 'agent';
  var div = document.createElement('div');
  div.className = 'msg' + (isAgent ? '' : ' user');
  if(animate !== false) div.style.animationDelay = '0ms';

  var avatarHtml = isAgent
    ? '<div class="msg-avatar agent-av">🤖</div>'
    : '<div class="msg-avatar user-av">👤</div>';

  var formatted = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.*?)`/g, '<span class="tag">$1</span>')
    .replace(/\n/g, '<br>');

  div.innerHTML = avatarHtml +
    '<div>' +
      '<div class="bubble ' + (isAgent ? 'agent' : 'user') + '">' + formatted + '</div>' +
      '<div class="msg-time">' + getTime() + '</div>' +
    '</div>';

  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function showTyping(show){
  document.getElementById('typingIndicator').className = 'typing-indicator' + (show ? ' show' : '');
  if(show) document.getElementById('messages').scrollTop = 999999;
}

async function sendMessage(){
  var box = document.getElementById('inputBox');
  var text = box.value.trim();
  if(!text || isThinking) return;
  box.value = '';
  box.style.height = 'auto';
  doSend(text);
}

function sendQuick(text){
  if(isThinking) return;
  doSend(text);
}

async function doSend(text){
  isThinking = true;
  document.getElementById('sendBtn').disabled = true;
  addMessage('user', text);
  history.push({role:'user', content: text});
  showTyping(true);

  try {
    var res = await fetch('/api/yagami', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ messages: history })
    });
    var data = await res.json();
    var reply = data.reply || "I'm having a moment — try again!";
    history.push({role:'assistant', content: reply});
    showTyping(false);
    addMessage('agent', reply);
  } catch(e) {
    showTyping(false);
    addMessage('agent', "Connection issue — please try again in a moment.");
  }

  isThinking = false;
  document.getElementById('sendBtn').disabled = false;
}

// AUTO RESIZE TEXTAREA
document.getElementById('inputBox').addEventListener('input', function(){
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});
document.getElementById('inputBox').addEventListener('keydown', function(e){
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
});

// INTRO MESSAGE
setTimeout(function(){
  addMessage('agent', "Hey! 👋 This is **Mr Selana's AI Agent**, **Yagami** — how may I assist you?\n\nI can tell you everything about Iphile's **skills**, **projects**, **services**, and how to **hire him**. What would you like to know?");
}, 400);
</script>
</body>
</html>
